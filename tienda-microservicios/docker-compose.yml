version: '3.8'

services:
  db-usuarios:
    image: postgres:15
    container_name: db_usuarios
    environment:
      POSTGRES_DB: usuarios_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5432:5432"
    volumes:
      - pgdata_usuarios:/var/lib/postgresql/data

  db-productos:
    image: postgres:15
    container_name: db_productos
    environment:
      POSTGRES_DB: productos_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5433:5432"
    volumes:
      - pgdata_productos:/var/lib/postgresql/data

  db-pedidos:
    image: postgres:15
    container_name: db_pedidos
    environment:
      POSTGRES_DB: pedidos_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5434:5432"
    volumes:
      - pgdata_pedidos:/var/lib/postgresql/data

volumes:
  pgdata_usuarios:
  pgdata_productos:
  pgdata_pedidos: